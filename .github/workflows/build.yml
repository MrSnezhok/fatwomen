name: Build Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Geode CLI
        run: |
          curl -L -o geode.exe https://github.com/geode-sdk/cli/releases/download/v3.0.0/geode-windows.exe
      
      - name: Build mod
        run: |
          ./geode.exe sdk install --yes
          ./geode.exe sdk install-binaries --yes
          ./geode.exe build
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fatwomen-mod
          path: build/*.geode
