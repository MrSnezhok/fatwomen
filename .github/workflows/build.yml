name: Build Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/geode-sdk/build:latest
      options: --user root
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build mod
        run: |
          geode sdk install latest
          geode build
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fatwomen-mod
          path: build/*.geode
