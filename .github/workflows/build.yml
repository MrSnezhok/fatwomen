name: Build Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: latest
          target: Win64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fatwomen-geode
          path: build/*.geode
