name: Build Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Geode CLI
        run: |
          wget https://github.com/geode-sdk/cli/releases/download/v3.0.0/geode-ubuntu-linux.zip
          unzip geode-ubuntu-linux.zip
          chmod +x geode
          sudo mv geode /usr/local/bin/
      
      - name: Build mod
        run: |
          geode sdk install
          geode sdk install-binaries
          geode build
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fatwomen-mod
          path: build/*.geode
